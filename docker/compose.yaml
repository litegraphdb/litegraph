services:

  #
  # PostgreSQL
  # Primary storage backend for the Docker deployment.
  #

  postgresql:
    container_name: 'litegraph-postgresql'
    image: 'postgres:17'
    stdin_open: true
    tty: true
    ports:
      - '${LITEGRAPH_POSTGRESQL_HOST_PORT:-15432}:5432'
    environment:
      POSTGRES_DB: '${LITEGRAPH_POSTGRESQL_DATABASE:-litegraph}'
      POSTGRES_USER: '${LITEGRAPH_POSTGRESQL_USERNAME:-litegraph}'
      POSTGRES_PASSWORD: '${LITEGRAPH_POSTGRESQL_PASSWORD:-litegraph}'
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 2s
      retries: 10

  #
  # LiteGraph Server
  # See https://hub.docker.com/r/jchristn77/litegraph
  # and https://github.com/jchristn/LiteGraph
  #

  litegraph:
    container_name: 'litegraph'
    image: 'jchristn77/litegraph:v7.0.0'
    stdin_open: true
    tty: true
    ports:
      - '8701:8701'
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      LITEGRAPH_DB_TYPE: 'Postgresql'
      LITEGRAPH_DB_HOST: 'postgresql'
      LITEGRAPH_DB_PORT: '5432'
      LITEGRAPH_DB_NAME: '${LITEGRAPH_POSTGRESQL_DATABASE:-litegraph}'
      LITEGRAPH_DB_USERNAME: '${LITEGRAPH_POSTGRESQL_USERNAME:-litegraph}'
      LITEGRAPH_DB_PASSWORD: '${LITEGRAPH_POSTGRESQL_PASSWORD:-litegraph}'
      LITEGRAPH_DB_SCHEMA: '${LITEGRAPH_POSTGRESQL_SCHEMA:-litegraph}'
      LITEGRAPH_DB_MAX_CONNECTIONS: '${LITEGRAPH_DB_MAX_CONNECTIONS:-32}'
      LITEGRAPH_DB_COMMAND_TIMEOUT_SECONDS: '${LITEGRAPH_DB_COMMAND_TIMEOUT_SECONDS:-30}'
    volumes:
      - ./litegraph.json:/app/litegraph.json
      # Mount the full docker directory so vector indexes, backups, logs, and
      # optional migration artifacts persist together.
      - ./:/app/docker/
      - ./logs/litegraph/:/app/logs/
      - ./backups/litegraph/:/app/backups/
    healthcheck:
      test: curl --fail http://localhost:8701
      interval: 5s
      timeout: 2s
      retries: 3

  #
  # LiteGraph MCP Server
  # See https://hub.docker.com/r/jchristn77/litegraph-mcp
  # and https://github.com/jchristn/LiteGraph
  #

  litegraph-mcp:
    container_name: 'litegraph-mcp'
    image: 'jchristn77/litegraph-mcp:v7.0.0'
    stdin_open: true
    tty: true
    ports:
      - '8702:8702'
      - '8703:8703'
      - '8704:8704'
    depends_on:
      litegraph:
        condition: service_healthy
    volumes:
      - ./litegraph-mcp.json:/app/litegraph.json
      - ./logs/litegraph-mcp/:/app/logs/
      - ./backups/litegraph-mcp/:/app/backups/
    healthcheck:
      test: curl --fail http://localhost:8702
      interval: 5s
      timeout: 2s
      retries: 3

  #
  # LiteGraph UI
  # See https://hub.docker.com/r/jchristn77/litegraph-ui
  # and https://github.com/jchristn/LiteGraph/tree/master/dashboard
  #

  litegraph-ui:
    container_name: 'litegraph-ui'
    image: 'jchristn77/litegraph-ui:v7.0.0'
    stdin_open: true
    tty: true
    ports:
      - '3001:3000'
    depends_on:
      litegraph:
        condition: service_healthy
    # Publish the UI on host port 3001 so Grafana can keep using 3000.
    healthcheck:
      test: curl --fail http://localhost:3000
      interval: 5s
      timeout: 2s
      retries: 3

  #
  # Prometheus
  # Scrapes LiteGraph metrics from http://litegraph:8701/metrics.
  #

  prometheus:
    container_name: 'litegraph-prometheus'
    image: 'prom/prometheus:latest'
    stdin_open: true
    tty: true
    ports:
      - '9090:9090'
    depends_on:
      litegraph:
        condition: service_healthy
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  #
  # Grafana OSS
  # Preconfigured with Prometheus and the LiteGraph dashboard.
  #

  grafana:
    container_name: 'litegraph-grafana'
    image: 'grafana/grafana-oss:latest'
    stdin_open: true
    tty: true
    ports:
      - '3000:3000'
    depends_on:
      prometheus:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: 'admin'
      GF_SECURITY_ADMIN_PASSWORD: 'admin'
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../assets/grafana:/var/lib/grafana/dashboards/litegraph:ro

volumes:
  postgresql-data:
  prometheus-data:
  grafana-storage:

